name: Build APK

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Auto-fix lingering old package imports
        run: |
          echo "Sweeping codebase for any missed package renames..."
          find . -type f \( -name "*.kt" -o -name "*.xml" -o -name "*.kts" \) -exec sed -i 's/com\.arturo254\.opentune/com.huayin.music/g' {} +
          find . -type f \( -name "*.kt" -o -name "*.xml" -o -name "*.kts" \) -exec sed -i 's/com\.arturo254/com.huayin/g' {} +

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Clean and Build Debug APK
        # We run 'clean' to clear corrupted KSP caches
        # We use --info so that if a Kotlin import is broken, it actually prints it in the GitHub Action logs
        run: |
          ./gradlew clean
          ./gradlew assembleDebug --no-daemon --stacktrace --info

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: HuaYin-Debug-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7