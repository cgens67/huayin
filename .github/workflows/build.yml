name: Build APK

# This triggers the workflow whenever you push a commit to any branch
on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive # Fetches submodules if you have any

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21' # The app uses Java 21 as defined in your build.gradle.kts
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        # We build the debug APK because it doesn't require setting up release signing keys.
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: HuaYin-Debug-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7 # The APK will be available to download for 7 days