name: Build APK

on:
  push:
    branches:[ "**" ]
  pull_request:
    branches: [ "**" ]

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Auto-fix Packages and Schemas
        run: |
          echo "1. Sweeping codebase for any missed package renames..."
          find . -type f \( -name "*.kt" -o -name "*.xml" -o -name "*.kts" -o -name "*.json" \) -exec sed -i 's/com\.arturo254\.opentune/com.huayin.music/g' {} +
          find . -type f \( -name "*.kt" -o -name "*.xml" -o -name "*.kts" -o -name "*.json" \) -exec sed -i 's/com\.arturo254/com.huayin/g' {} +
          find . -type f \( -name "*.kts" \) -exec sed -i 's/com\.Arturo254\.opentune/com.huayin.music/g' {} +
          
          echo "2. Fixing Room Database Schema path..."
          mkdir -p app/schemas/com.huayin.music.db.InternalDatabase
          if[ -d "app/schemas/com.arturo254.opentune.db.InternalDatabase" ]; then
            cp -r app/schemas/com.arturo254.opentune.db.InternalDatabase/* app/schemas/com.huayin.music.db.InternalDatabase/ 2>/dev/null || true
          fi

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Clean and Build Debug APK
        run: |
          ./gradlew clean
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: HuaYin-Debug-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7