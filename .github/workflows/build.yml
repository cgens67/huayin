name: Build Release APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch: # Allows you to trigger the build manually from the Actions tab

jobs:
  build:
    name: Build Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Generate temporary keystore
        run: |
          # Generates a temporary keystore valid for 10000 days
          keytool -genkey -v \
            -keystore temp_release.keystore \
            -alias temp_alias \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass temp_password \
            -keypass temp_password \
            -dname "CN=Temp, OU=Temp, O=Temp, L=Temp, S=Temp, C=US"
          
          # Save the absolute path of the generated keystore to GitHub Environment variables
          echo "TEMP_KEYSTORE_PATH=$(pwd)/temp_release.keystore" >> $GITHUB_ENV

      - name: Build Release APK
        env:
          # Feed the temporary keystore details into the environment variables your app expects
          APP_RELEASE_STORE_FILE: ${{ env.TEMP_KEYSTORE_PATH }}
          APP_RELEASE_STORE_PASSWORD: temp_password
          APP_RELEASE_KEY_ALIAS: temp_alias
          APP_RELEASE_KEY_PASSWORD: temp_password
        run: ./gradlew assembleRelease

      - name: Upload Release APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: OpenTune-Release-APK
          path: app/build/outputs/apk/release/*.apk
          retention-days: 90
